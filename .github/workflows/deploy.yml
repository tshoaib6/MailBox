name: Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/sendportal

jobs:
  build-and-deploy:
    name: Build Docker image and deploy to server
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set image tag (short commit SHA) ──────────────────────────────────
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── 4. Set up Docker Buildx (for caching) ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build and push image ──────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy to server via SSH ──────────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/sendportal
            IMAGE="${{ env.IMAGE_NAME }}"
            TAG="${{ env.IMAGE_TAG }}"

            echo "==> Deploying version: $TAG"

            # Pull latest source (for docker-compose.yml updates)
            cd $APP_DIR
            git pull origin main

            # Write the new image tag into .env
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$TAG|" .env
            else
              echo "IMAGE_TAG=$TAG" >> .env
            fi

            if grep -q '^DOCKER_USERNAME=' .env; then
              sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}|" .env
            else
              echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            fi

            # Pull the new image
            docker pull $IMAGE:$TAG

            # Restart containers with the new image
            docker compose up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f

            echo "==> Deploy complete: $TAG"
